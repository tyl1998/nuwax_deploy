# Redis 配置文件
bind 0.0.0.0
protected-mode no
tcp-backlog 511
timeout 0
tcp-keepalive 300

# 持久化配置
dir /data
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# RDB 持久化配置
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb

# 内存管理
maxmemory 256mb
maxmemory-policy allkeys-lru

# 日志配置
loglevel notice
logfile /data/logs/redis/redis.log

# 其他配置
daemonize no 