# Map configuration for WebSocket upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    client_max_body_size 200M;
    listen       80;
    listen  [::]:80;

    # 全局日志配置
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    charset utf-8;

    # Gzip压缩配置
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    # 健康检查端点
    location = /ready {
        proxy_pass http://backend:8080/ready;
        proxy_connect_timeout 3s;
        proxy_read_timeout 3s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    location = /health {
        proxy_pass http://backend:8080/health;
        proxy_connect_timeout 3s;
        proxy_read_timeout 3s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # Computer 智能体桌面路由（VNC、音频、IME 等）代理到 rcoder
    location /computer/ {
        proxy_pass http://host.docker.internal:9086;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        root    /app/nginx/html;
        try_files $uri $uri/ /index.html;
        index  index.html index.htm;

        # 静态资源缓存配置
        location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?)$ {
            expires 1d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
    location /page/ {
            proxy_buffering off;
            proxy_pass http://backend:18082;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 关键配置：拦截backend的错误响应
            proxy_intercept_errors on;

            # 处理404错误
            error_page 404 = @custom404;
            error_page 500 502 503 504 = @custom50x;
        }

    # 后端接口代理，保持完整路径转发到 8080 端口
    location /api {
        proxy_pass http://backend:8080;  # 不加路径，会保持原始请求路径
        # 连接超时设置
        proxy_connect_timeout 3s;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 关闭缓冲
        proxy_buffering off;

        # 添加 CORS 头
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization, Special-Topic-Id';
        add_header 'Access-Control-Allow-Credentials' 'true';
        add_header 'Access-Control-Max-Age' 1728000;

        # 处理预检请求
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization, Special-Topic-Id';
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    location /computer/ {
            proxy_pass http://backend:18085;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
    }
    # 精确匹配 websockify
    location ~ ^/computer/desktop/(?<agent_id>[0-9]+)/websockify {
        proxy_pass http://backend:18085/computer/desktop/$agent_id/websockify;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
    # 精确匹配 audio
    location ~ ^/computer/audio/(?<cid>[0-9]+)/ws {
        proxy_pass http://backend:18085/computer/audio/$cid/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
    # noVNC 静态文件
    location ~ ^/computer/desktop/[0-9]+/(.+)$ {
        set $file_path $1;
        # 阻止包含 .. 的路径
        if ($file_path ~* "\.\.") {
            return 403 "Forbidden";
        }
        # 阻止绝对路径
        if ($file_path ~* "^/") {
            return 403 "Forbidden";
        }
            alias /home/novnc/$file_path;
        }

    # 文件目录代理,用于下载文件使用
    location /files/ {
        alias    /app/upload/;
        # 禁用目录浏览
        autoindex off;
        # 静态资源缓存配置
        location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    location ^~ /api/proxy/sandbox/ {
        proxy_buffering off;
        proxy_pass http://backend:18087;
        proxy_read_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # 模型代理
    location ^~ /api/proxy/model {
        proxy_buffering off;
        proxy_pass http://backend:18086;
        proxy_read_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 自定义错误页面
    error_page   404              /custom/404.html;
    error_page   502              /custom/502.html;
    error_page   500 503 504     /50x.html;

    location = /custom/404.html {
        root   /usr/share/nginx/html;
    }
    location = /custom/502.html {
        root   /usr/share/nginx/html;
    }
    location = /50x.html {
        root   /app/nginx/html;
    }

    # 自定义错误处理location块（用于处理backend返回的错误）
    location @custom404 {
        internal;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        root /usr/share/nginx/html;
        try_files /custom/404.html =404;
    }

    location @custom50x {
        internal;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        root /usr/share/nginx/html;
        try_files /custom/502.html =502;
    }
}