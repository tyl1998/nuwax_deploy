<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面不存在</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #e0e7ff 0%, #ede9fe 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .error-container {
      text-align: center;
      padding: 50px 40px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      max-width: 520px;
      margin: 20px;
      position: relative;
    }

    .icon-container {
      width: 80px;
      height: 80px;
      margin: 0 auto 30px;
      background: linear-gradient(135deg, #d1d5db, #9ca3af);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      opacity: 0.8;
    }

    .icon-container::after {
      content: '?';
      position: absolute;
      color: white;
      font-size: 40px;
      font-weight: bold;
    }

    .error-title {
      font-size: 24px;
      font-weight: 400;
      color: #2d3748;
      margin-bottom: 16px;
    }

    .error-description {
      font-size: 14px;
      color: #4a5568;
      line-height: 1.7;
      margin-bottom: 16px;
      font-weight: 400;
    }

    .error-subtitle {
      font-size: 12px;
      color: #718096;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .additional-info {
      margin-top: 32px;
      padding-top: 18px;
      border-top: 1px solid #e2e8f0;
      font-size: 11px;
      color: #718096;
    }

    .additional-info p {
      margin-bottom: 6px;
    }

    .additional-info p:last-child {
      margin-bottom: 0;
      font-size: 10px;
      opacity: 0.7;
    }

    @media (max-width: 480px) {
      .error-container {
        padding: 32px 20px;
        margin: 10px;
      }

      .icon-container {
        width: 60px;
        height: 60px;
        margin-bottom: 20px;
      }

      .icon-container::after {
        font-size: 28px;
      }

      .error-title {
        font-size: 22px;
      }

      .error-description {
        font-size: 13px;
      }

      .error-subtitle {
        font-size: 11px;
        margin-bottom: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="error-container">
    <div class="icon-container"></div>
    <h1 class="error-title">页面不存在</h1>
    <div class="error-description">
      您访问的页面可能已被删除或不存在
    </div>
    <div class="error-subtitle">
      请检查网址是否正确，或返回首页继续浏览
    </div>
    <div class="additional-info">
      <p id="time"></p>
    </div>
  </div>

  <script>
    function updateTime() {
      const now = new Date();
      const timeString = now.toLocaleString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
      document.getElementById('time').textContent = timeString;
    }

    updateTime();
  </script>
</body>

</html>
