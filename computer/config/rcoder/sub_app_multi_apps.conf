
server {
        listen       80;
        
        # 日志配置
        access_log /app/logs/nginx_access.log;
        error_log /app/logs/nginx_error.log warn;
        
        # 字符集
        charset utf-8;
        # 健康检查
        location = /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Computer 智能体桌面路由（VNC、音频、IME 等）代理到 rcoder 后端
        location /computer/ {
            proxy_pass http://127.0.0.1:8086;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # API 路由代理到 rcoder 后端
        location /api/ {
            proxy_pass http://127.0.0.1:8086;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 项目主路由 - 格式: /page/{projectId}(-{agentId})/{env}/{resource}
        location ~ ^/page/([0-9]+)(?:-([0-9]+))?/(dev|prod)(/.*)?$ {
            set $project_id $1;
            set $env_name $3;
            set $resource_path $4;
            
            # 构建项目根目录路径
            set $project_root /app/project_nginx/$project_id/dist;
            
            # 设置根目录
            root $project_root;
            
            # 尝试查找文件，如果不存在则返回index.html（支持SPA）
            try_files $resource_path $resource_path/index.html /index.html;
            
            # 响应头设置
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
            
            # OPTIONS请求处理（CORS预检）
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin * always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
        }

        location / {
            root   html;
            index  index.html index.htm;
        }

        # 错误页面
        error_page   404              /custom/404.html;
        error_page   500 503 504     /50x.html;
        error_page   502              /custom/502.html;
        location = /custom/404.html {
            root   /usr/share/nginx;
        }
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
        location = /custom/502.html {
            root   /usr/share/nginx;
        }
    }
